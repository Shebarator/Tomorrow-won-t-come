<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тик-Так</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0), rgba(0,0,0,0.08) 1px, transparent 2px);
            opacity: 0.2;
            animation: staticNoise 0.2s infinite;
        }

        @keyframes staticNoise {
            0% { background-position: 0 0; opacity: 0.15; }
            100% { background-position: 10px 20px; opacity: 0.25; }
        }   

        .timer {
            font-size: 6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 40px;
            position: relative;
            z-index: 3;
        }

        .main-text {
            font-size: 4rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.85);
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 60px;
            position: relative;
            z-index: 3;
        }

        @keyframes glitchFlash {
            0% { transform: skew(0deg, 0deg); text-shadow: 2px 0 red, -2px 0 blue; opacity: 1; }
            25% { transform: skew(2deg, 1deg); text-shadow: -3px 0 cyan, 3px 0 magenta; }
            50% { transform: skew(-2deg, -1deg); text-shadow: 4px 0 lime, -4px 0 purple; }
            75% { transform: skew(1deg, -1deg); text-shadow: -4px 0 yellow, 4px 0 red; }
            100% { transform: skew(0deg, 0deg); text-shadow: none; }
        }

        .glitch-active {
            animation: glitchFlash 0.12s 4;
        }

        .whispers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .whisper {
            position: absolute;
            font-family: 'Comic Sans MS', 'Segoe Script', 'Pecita', cursive;
            font-size: 1.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            opacity: 0;
            animation: floatAndFade 12s infinite ease-in-out;
            transform-origin: center;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 5;
            pointer-events: none;
        }

        @keyframes floatAndFade {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-5deg);
            }
            10% {
                opacity: 0.7;
            }
            30% {
                opacity: 0.8;
                transform: translate(40px, -20px) rotate(2deg);
            }
            70% {
                opacity: 0.5;
                transform: translate(-20px, -60px) rotate(-3deg);
            }
            100% {
                opacity: 0;
                transform: translate(80px, -120px) rotate(5deg);
            }
        }

        .footer-note {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: monospace;
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .timer {
                font-size: 2.8rem;
                letter-spacing: 4px;
            }
            .main-text {
                font-size: 2rem;
                letter-spacing: 6px;
            }
            .whisper {
                font-size: 1rem;
            }
        }

        .secret-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border-left: 3px solid #ff3366;
            padding: 12px 16px;
            max-width: 240px;
            font-size: 0.75rem;
            color: #ddd;
            font-family: monospace;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
<div class="noise"></div>
<div class="container">
    <div class="main-text">ТИК-ТАК</div>
    <div class="timer" id="countdown">-- : -- : -- : --</div>
    <div id="finalMessage" style="display: none; color: red; font-size: 2rem;">Время вышло. Ты опоздала.</div>
</div>

<div class="whispers" id="whispersContainer"></div>
<div class="footer-note">8 МАЯ 23:59</div>

<script>
    function getTargetDate() {
        const now = new Date();
        let target = new Date(2026, 4, 8, 23, 59, 0);
        if (target <= now) {
            target.setFullYear(target.getFullYear() + 1);
        }
        return target;
    }

    const targetDate = getTargetDate();

    function updateTimer() {
        const now = Date.now();
        const diff = targetDate.getTime() - now;

        if (diff <= 0) {
            const finalDiv = document.getElementById('finalMessage');
            finalDiv.style.display = 'block';
            document.getElementById('countdown').innerHTML = "00 : 00 : 00 : 00";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
        const seconds = Math.floor((diff % (60000)) / 1000);

        const formatted = `${days.toString().padStart(2, '0')} : ${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${seconds.toString().padStart(2, '0')}`;
        document.getElementById('countdown').innerHTML = formatted;
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    const phrases = [
        "шанс был", "я ждал", "я хотел", "тебя не было рядом", 
        "никогда", "я существую?", "ты обещала", "тишина", 
        "один", "не захотела", "не пришла", "пустота",
        "меня почти нет", "где ты?..", "время заканчивается", 
        "почему так", "я не хотел", "всё заканчивается",
        "бессмысленно", "отчаяние", "конец так близко"
    ];

    const container = document.getElementById('whispersContainer');

    function createWhisper(text) {
        const span = document.createElement('div');
        span.className = 'whisper';
        span.textContent = text;

        const randLeft = Math.random() * 90;
        const randTop = Math.random() * 90;
        const randDuration = 8 + Math.random() * 12;
        const randDelay = Math.random() * 15;

        span.style.left = randLeft + '%';
        span.style.top = randTop + '%';
        span.style.animationDuration = randDuration + 's';
        span.style.animationDelay = randDelay + 's';
        span.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
        span.style.opacity = 0.2 + Math.random() * 0.3;

        container.appendChild(span);

        if (Math.random() < 0.2) span.classList.add('whisper-flicker');

        span.addEventListener('animationend', () => {
            span.remove();
        });
    }

    setInterval(() => {
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        createWhisper(randomPhrase);
    }, 2500);

    for (let i = 0; i < 8; i++) {
        setTimeout(() => {
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            createWhisper(randomPhrase);
        }, i * 400);
    }


const timerEl = document.getElementById('countdown');
const mainTextEl = document.querySelector('.main-text');

function applyGlitch() {
    timerEl.classList.add('glitch-active');
    mainTextEl.classList.add('glitch-active');
    setTimeout(() => {
        timerEl.classList.remove('glitch-active');
        mainTextEl.classList.remove('glitch-active');
    }, 500);
}


setInterval(() => {
    if (Math.random() < 1) applyGlitch();
}, 5000);


document.addEventListener('keydown', (e) => {
    if (e.key === 'g' || e.key === 'G' || e.key == 'п' || e.key == 'П') {
        applyGlitch();
        timerEl.style.transform = 'translate(2px, -1px)';
        mainTextEl.style.transform = 'translate(-1px, 1px)';
        setTimeout(() => {
            timerEl.style.transform = '';
            mainTextEl.style.transform = '';
        }, 200);
    }
});


const footer = document.querySelector('.footer-date');
const secretDiv = document.getElementById('secretMsg');
if (footer && secretDiv) {
    footer.style.cursor = 'pointer';
    footer.addEventListener('click', () => {
        secretDiv.style.opacity = '1';
        setTimeout(() => {
            secretDiv.style.opacity = '0';
        }, 4000);
    });
}
</script>
<div class="secret-message" id="secretMsg">Ты здесь. Каждый раз — как пощёчина. Тик-так.</div>
</body>
</html>
