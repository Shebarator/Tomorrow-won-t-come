<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тик-Так</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        body {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            font-family: 'Courier New', 'Monaco', monospace;
            position: relative;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0), rgba(0,0,0,0.08) 1px, transparent 2px);
            opacity: 0.25;
            animation: staticNoise 0.15s infinite;
        }

        @keyframes staticNoise {
            0% { background-position: 0 0; opacity: 0.15; }
            100% { background-position: 15px 25px; opacity: 0.3; }
        }

        .center-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 20;
            padding: 20px;
            pointer-events: none;
        }

        .center-wrapper * {
            pointer-events: auto;
        }

        .main-text {
            font-size: clamp(1.8rem, 10vw, 4rem);
            font-weight: 800;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 20px;
            transition: all 0.05s ease;
        }

        .timer {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            letter-spacing: 0.1em;
            white-space: nowrap;
            transition: all 0.05s ease;
        }

        @keyframes glitchFlash {
            0% { transform: skew(0deg, 0deg) translate(0, 0); text-shadow: 3px 0 red, -3px 0 blue; }
            20% { transform: skew(5deg, 2deg) translate(4px, -2px); text-shadow: -5px 0 cyan, 5px 0 magenta; letter-spacing: 10px; }
            40% { transform: skew(-4deg, -2deg) translate(-4px, 3px); text-shadow: 6px 0 lime, -6px 0 purple; }
            60% { transform: skew(3deg, -2deg) translate(2px, 2px); text-shadow: -6px 0 yellow, 6px 0 red; }
            80% { transform: skew(-2deg, 3deg) translate(-3px, -1px); text-shadow: 4px 0 white, -4px 0 black; }
            100% { transform: skew(0deg, 0deg) translate(0, 0); text-shadow: none; letter-spacing: normal; }
        }

        .glitch-active {
            animation: glitchFlash 0.18s 4;
        }

        .whispers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .whisper {
            position: absolute;
            font-family: 'Comic Sans MS', 'Segoe Script', cursive;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            font-size: 4vw;
            opacity: 0;
            animation: floatUp 10s ease-in-out forwards;
            color: rgba(255, 200, 200, 0.7);
            text-shadow: 0 0 8px rgba(255, 120, 120, 0.4);
            transition: left 0.2s ease-out, top 0.2s ease-out;
        }

        /* новая анимация — только вверх, без горизонтального улёта */
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(-3deg);
            }
            15% {
                opacity: 0.8;
                transform: translateY(-10px) rotate(0deg);
            }
            50% {
                opacity: 0.5;
                transform: translateY(-40px) rotate(2deg);
            }
            85% {
                opacity: 0.3;
                transform: translateY(-80px) rotate(4deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) rotate(6deg);
            }
        }

        /* ТОЛЬКО ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            .whisper {
                font-size: 5vw !important;
                white-space: normal;
                word-break: keep-all;
                max-width: 80vw;
                text-align: center;
                animation: floatUpPhone 10s ease-in-out forwards;
            }
            
            @keyframes floatUpPhone {
                0% {
                    opacity: 0;
                    transform: translateY(0) rotate(-2deg);
                }
                15% {
                    opacity: 0.8;
                    transform: translateY(-5px);
                }
                50% {
                    opacity: 0.5;
                    transform: translateY(-20px);
                }
                85% {
                    opacity: 0.3;
                    transform: translateY(-40px);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-60px);
                }
            }
        }

        .footer-date {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 5vw;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .dim-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            pointer-events: none;
            z-index: 25;
            transition: background 2s ease;
        }
        .dim-overlay.active {
            background: rgba(0,0,0,0.85);
        }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="whispers" id="whispersContainer"></div>

<div class="center-wrapper">
    <div class="main-text" id="mainGlitch">ТИК-ТАК</div>
    <div class="timer" id="countdown">-- : -- : -- : --</div>
</div>

<div class="footer-date" id="footerDate">8 МАЯ 23:59</div>
<div class="dim-overlay" id="dimOverlay"></div>

<script>
    (function() {
        // ========== ТАЙМЕР ==========
        function getTargetDate() {
            let target = new Date(2026, 4, 8, 23, 59, 0);
            if (target <= new Date()) {
                target.setFullYear(target.getFullYear() + 1);
            }
            return target;
        }

        const targetDate = getTargetDate();
        const timerEl = document.getElementById('countdown');
        const mainTextEl = document.getElementById('mainGlitch');
        const ORIGINAL_TEXT = "ТИК-ТАК";

        function updateTimer() {
            const now = Date.now();
            const diff = targetDate.getTime() - now;
            if (diff <= 0) {
                timerEl.innerHTML = "00 : 00 : 00 : 00";
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
            const seconds = Math.floor((diff % (60000)) / 1000);
            timerEl.innerHTML = `${days.toString().padStart(2,'0')} : ${hours.toString().padStart(2,'0')} : ${minutes.toString().padStart(2,'0')} : ${seconds.toString().padStart(2,'0')}`;
        }

        updateTimer();
        let timerInterval = setInterval(updateTimer, 1000);

        // ========== ТЕКСТОВЫЕ ГЛЮКИ ==========
        const glitchedVariants = [
            "Т1К-Т4К", "Т!К-Т@К", "ТИХ-ТАХ", "ТИК-Т??", "*******",
            "Тік-Так", "TIK-TAK", "ТИК-ГАК", "3ИК-ТАК",
            "Т!К-ТАК", "ТИК-ТАК?", "Т/К-Т\\К", "ТИК_ТАК", "Т1К-ТАК"
        ];

        let textGlitchTimeout = null;

        function applyTextGlitch() {
            const randomVariant = glitchedVariants[Math.floor(Math.random() * glitchedVariants.length)];
            mainTextEl.textContent = randomVariant;
            mainTextEl.style.transform = 'skew(2deg, 1deg)';
            mainTextEl.style.textShadow = '2px 0 red, -2px 0 blue';
            if (textGlitchTimeout) clearTimeout(textGlitchTimeout);
            textGlitchTimeout = setTimeout(() => {
                mainTextEl.textContent = ORIGINAL_TEXT;
                mainTextEl.style.transform = '';
                mainTextEl.style.textShadow = '';
            }, 600);
        }

        setInterval(() => {
            if (Math.random() < 0.9) applyTextGlitch();
        }, 6000);

        // ========== ВИЗУАЛЬНЫЙ ГЛИТЧ ==========
        function applyVisualGlitch() {
            timerEl.classList.add('glitch-active');
            mainTextEl.classList.add('glitch-active');
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
            timerEl.style.filter = 'blur(1px)';
            mainTextEl.style.filter = 'blur(1px)';
            setTimeout(() => {
                timerEl.classList.remove('glitch-active');
                mainTextEl.classList.remove('glitch-active');
                timerEl.style.filter = '';
                mainTextEl.style.filter = '';
            }, 500);
        }

        setInterval(() => { applyVisualGlitch(); }, 5000);

        function fullGlitch() {
            applyVisualGlitch();
            applyTextGlitch();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'g' || e.key === 'G') {
                fullGlitch();
                timerEl.style.transform = 'translate(3px, -2px)';
                mainTextEl.style.transform = 'translate(-2px, 2px)';
                setTimeout(() => {
                    timerEl.style.transform = '';
                    if (!mainTextEl.textContent.includes('ТИК-ТАК')) return;
                    mainTextEl.style.transform = '';
                }, 200);
            }
        });

        // ГЛИТЧ С ПЕРВОГО КАСАНИЯ
        document.body.addEventListener('touchstart', (e) => {
            fullGlitch();
        });

        // ========== ИНВЕРСИЯ ==========
        setInterval(() => {
            document.documentElement.style.filter = 'invert(1)';
            setTimeout(() => {
                document.documentElement.style.filter = '';
            }, 400);
        }, 10000);

        // ========== ПРОБЕЛ ЗАМОРАЖИВАЕТ ТАЙМЕР ==========
        let frozen = false;
        let frozenTimeout;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !frozen) {
                e.preventDefault();
                frozen = true;
                clearInterval(timerInterval);
                timerEl.style.opacity = '0.4';
                timerEl.style.filter = 'blur(2px)';
                frozenTimeout = setTimeout(() => {
                    timerInterval = setInterval(updateTimer, 1000);
                    timerEl.style.opacity = '1';
                    timerEl.style.filter = '';
                    frozen = false;
                }, 3000);
            }
        });

        // ========== ПРЕДУПРЕЖДЕНИЕ ПРИ ЗАКРЫТИИ ==========
        window.addEventListener('beforeunload', (e) => {
            const message = "Таймер продолжает тикать. Ты уверена?";
            e.preventDefault();
            e.returnValue = message;
            return message;
        });

        // ========== КЛИК ПО ДАТЕ ==========
        const footer = document.getElementById('footerDate');
        footer.addEventListener('click', (e) => {
            e.stopPropagation();
            alert("тик-так, тик-так, тик-так");
        });

        // ========== ШЁПОТЫ ==========
        const phrases = [
            "ты не пришла", "я ждал", "я существую?", "тебя нет", "тишина", "пустота", "почему так больно?", "где ты?..",
            "что я сделал не так?", "безразличие", "разочарование", "гордыня", "эгоизм", "равнодушие",
            "почему так..", "за что", "ты обещала", "предательство", "ложь", "страх", "боль", "один", "зачем?", "это конец?.."
        ];

        const container = document.getElementById('whispersContainer');
        let activeWhispers = 0;
        const MAX_WHISPERS = 18;

        function createWhisper(text) {
            activeWhispers++;
            const span = document.createElement('div');
            span.className = 'whisper';
            span.textContent = text;
            
            // безопасная зона: от 10% до 85%, чтобы не улетали за края
            span.style.left = (10 + Math.random() * 75) + '%';
            span.style.top = (5 + Math.random() * 70) + '%';
            
            const size = 1.2 + Math.random() * 2;
            span.style.fontSize = size + 'rem';
            span.style.animationDuration = (8 + Math.random() * 6) + 's';
            span.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(span);
            span.addEventListener('animationend', () => {
                activeWhispers--;
                span.remove();
            });
        }

        setInterval(() => {
            if (activeWhispers < MAX_WHISPERS) {
                createWhisper(phrases[Math.floor(Math.random() * phrases.length)]);
            }
        }, 1000);

        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                if (activeWhispers < MAX_WHISPERS) {
                    createWhisper(phrases[Math.floor(Math.random() * phrases.length)]);
                }
            }, i * 200);
        }

        // ========== ЗАТЕМНЕНИЕ ПРИ БЕЗДЕЙСТВИИ ==========
        const dimOverlay = document.getElementById('dimOverlay');
        let inactivityTimer;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            dimOverlay.classList.remove('active');
            inactivityTimer = setTimeout(() => {
                dimOverlay.classList.add('active');
            }, 60000);
        }

        ['mousemove', 'click', 'touchstart', 'keydown'].forEach(event => {
            document.addEventListener(event, resetInactivityTimer);
        });
        resetInactivityTimer();

        // ========== ФРАЗЫ УБЕГАЮТ ОТ КУРСОРА/ПАЛЬЦА ==========
        let mouseX = -10000, mouseY = -10000;

        function updateMousePosition(e) {
            if (e.touches) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            } else {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        }

        document.addEventListener('mousemove', updateMousePosition);
        document.addEventListener('touchmove', updateMousePosition);
        document.addEventListener('touchstart', updateMousePosition);

        function escapeFromCursor() {
            const whispers = document.querySelectorAll('.whisper');
            const REPULSION_RADIUS = 130;
            const ESCAPE_FORCE = 60;
            
            whispers.forEach(whisper => {
                const rect = whisper.getBoundingClientRect();
                const whisperCenterX = rect.left + rect.width / 2;
                const whisperCenterY = rect.top + rect.height / 2;
                
                const dx = whisperCenterX - mouseX;
                const dy = whisperCenterY - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < REPULSION_RADIUS) {
                    const angle = Math.atan2(dy, dx);
                    const force = (REPULSION_RADIUS - distance) / REPULSION_RADIUS * ESCAPE_FORCE;
                    const moveX = Math.cos(angle) * force;
                    const moveY = Math.sin(angle) * force;
                    
                    let newLeft = parseFloat(whisper.style.left) + (moveX / window.innerWidth * 100);
                    let newTop = parseFloat(whisper.style.top) + (moveY / window.innerHeight * 100);
                    
                    // жёсткие границы: фразы не выходят за пределы 5% - 85%
                    newLeft = Math.min(85, Math.max(5, newLeft));
                    newTop = Math.min(85, Math.max(5, newTop));
                    
                    whisper.style.left = newLeft + '%';
                    whisper.style.top = newTop + '%';
                }
            });
        }

        setInterval(escapeFromCursor, 50);
    })();
</script>
</body>
</html>
