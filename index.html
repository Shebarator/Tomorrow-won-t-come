<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тик-Так</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            position: relative;
        }
        /* инверсия будет применяться к этому классу */
        .invert {
            filter: invert(1);
        }
        .container {
            text-align: center;
            z-index: 2;
        }
        .timer {
            font-size: 6rem;
            color: white;
            text-shadow: 0 0 5px red;
            margin-bottom: 1rem;
        }
        .main-text {
            font-size: 4rem;
            color: white;
            margin-bottom: 2rem;
        }
        .footer-date {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            z-index: 10;
            background: black;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .secret-msg {
            position: fixed;
            bottom: 60px;
            right: 15px;
            background: black;
            color: #ff3366;
            padding: 10px;
            font-size: 0.8rem;
            border-left: 3px solid #ff3366;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }
        .whisper {
            position: fixed;
            font-family: 'Comic Sans MS', cursive;
            color: rgba(255,255,255,0.2);
            font-size: 1.2rem;
            white-space: nowrap;
            pointer-events: none;
            animation: fadeMove 8s linear forwards;
            z-index: 1;
        }
        @keyframes fadeMove {
            0% { opacity: 0; transform: translate(0, 0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translate(50px, -100px); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-text">ТИК-ТАК</div>
    <div class="timer" id="timer">-- : -- : -- : --</div>
</div>
<div class="footer-date" id="footerDate">8 МАЯ 23:59</div>
<div class="secret-msg" id="secretMsg">🔪 Ты здесь. Тик-так.</div>

<script>
    // ========== ТАЙМЕР ==========
    function getTarget() {
        let d = new Date(2026, 4, 8, 23, 59, 0);
        if (d <= new Date()) d.setFullYear(d.getFullYear() + 1);
        return d;
    }
    const target = getTarget();

    function updateTimer() {
        const diff = target - Date.now();
        if (diff <= 0) {
            document.getElementById('timer').innerHTML = "00 : 00 : 00 : 00";
            return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').innerHTML = 
            `${d.toString().padStart(2,'0')} : ${h.toString().padStart(2,'0')} : ${m.toString().padStart(2,'0')} : ${s.toString().padStart(2,'0')}`;
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // ========== ГЛИТЧ (КАЖДЫЕ 5 СЕК) ==========
    const timerEl = document.getElementById('timer');
    const mainEl = document.querySelector('.main-text');
    function glitch() {
        timerEl.style.transform = 'skew(2deg,1deg)';
        mainEl.style.transform = 'skew(-1deg,1deg)';
        timerEl.style.textShadow = '2px 0 red, -2px 0 blue';
        mainEl.style.textShadow = '2px 0 red, -2px 0 blue';
        setTimeout(() => {
            timerEl.style.transform = '';
            mainEl.style.transform = '';
            timerEl.style.textShadow = '';
            mainEl.style.textShadow = '';
        }, 150);
    }
    setInterval(glitch, 5000);

    // G — ручной глитч
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'g') glitch();
    });

    // ========== ИНВЕРСИЯ (РАБОТАЕТ ГАРАНТИРОВАННО) ==========
    setInterval(() => {
        document.body.classList.add('invert');
        setTimeout(() => {
            document.body.classList.remove('invert');
        }, 250);
    }, 10000);

    // ========== СКРЫТОЕ СООБЩЕНИЕ ПРИ КЛИКЕ НА ДАТУ ==========
    const footer = document.getElementById('footerDate');
    const secret = document.getElementById('secretMsg');
    footer.addEventListener('click', () => {
        secret.style.opacity = '1';
        setTimeout(() => secret.style.opacity = '0', 3000);
    });

    // ========== ПРЕДУПРЕЖДЕНИЕ ПРИ ЗАКРЫТИИ (СВОЙ ТЕКСТ) ==========
    window.addEventListener('beforeunload', (e) => {
        const myMessage = "Ты уверена? Время не ждёт.";
        e.preventDefault();
        e.returnValue = myMessage;
        return myMessage;
    });

    // ========== ШЁПОТЫ (СЛУЧАЙНЫЕ ФРАЗЫ) ==========
    const phrases = ["шанс был","я ждал","опоздала","30 минут","3.5 часа","ты обещала","я помню","последний шанс","пустота","время вышло"];
    function addWhisper() {
        let w = document.createElement('div');
        w.className = 'whisper';
        w.innerText = phrases[Math.floor(Math.random() * phrases.length)];
        w.style.left = Math.random() * 90 + '%';
        w.style.top = Math.random() * 90 + '%';
        w.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 8000);
    }
    setInterval(addWhisper, 3000);
    for(let i=0;i<5;i++) setTimeout(addWhisper, i*500);
</script>
</body>
</html>
