<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тик-Так</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
        }

        .main {
            text-align: center;
            z-index: 10;
        }

        .main-text {
            font-size: 15vw;
            font-weight: 900;
            color: white;
            letter-spacing: 0.1em;
            margin-bottom: 5vw;
        }

        .timer {
            font-size: 10vw;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 10px red;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .whispers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .whisper {
            position: absolute;
            font-family: 'Comic Sans MS', cursive;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.35);
            white-space: nowrap;
            font-size: 4vw;
            animation: float 10s linear forwards;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-5deg);
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
                transform: translate(5vw, -30vh) rotate(5deg);
            }
        }

        .footer {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 5vw;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        @keyframes glitch {
            0% { transform: skew(0deg); text-shadow: 3px 0 red, -3px 0 blue; }
            25% { transform: skew(3deg); text-shadow: -4px 0 cyan, 4px 0 magenta; letter-spacing: 0.2em; }
            50% { transform: skew(-3deg); text-shadow: 5px 0 lime, -5px 0 purple; }
            75% { transform: skew(2deg); text-shadow: -3px 0 yellow, 3px 0 red; }
            100% { transform: skew(0deg); text-shadow: none; letter-spacing: normal; }
        }

        .glitch-on {
            animation: glitch 0.15s 3;
        }
    </style>
</head>
<body>

<div class="whispers" id="whispers"></div>

<div class="main">
    <div class="main-text" id="title">ТИК-ТАК</div>
    <div class="timer" id="timer">-- : -- : -- : --</div>
</div>

<div class="footer" id="footer">8 МАЯ 23:59</div>

<script>
    // === ТАЙМЕР ===
    let target = new Date(2026, 4, 8, 23, 59, 0);
    if (target <= new Date()) target.setFullYear(target.getFullYear() + 1);

    const timerDiv = document.getElementById('timer');
    const titleDiv = document.getElementById('title');
    const originalTitle = "ТИК-ТАК";

    function updateTimer() {
        let diff = target - Date.now();
        if (diff <= 0) {
            timerDiv.innerText = "00 : 00 : 00 : 00";
            return;
        }
        let d = Math.floor(diff / 86400000);
        let h = Math.floor((diff % 86400000) / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);
        timerDiv.innerText = `${d.toString().padStart(2,'0')} : ${h.toString().padStart(2,'0')} : ${m.toString().padStart(2,'0')} : ${s.toString().padStart(2,'0')}`;
    }
    updateTimer();
    let timerInterval = setInterval(updateTimer, 1000);

    // === ВИЗУАЛЬНЫЙ ГЛИТЧ ===
    function glitch() {
        timerDiv.classList.add('glitch-on');
        titleDiv.classList.add('glitch-on');
        setTimeout(() => {
            timerDiv.classList.remove('glitch-on');
            titleDiv.classList.remove('glitch-on');
        }, 500);
    }
    setInterval(glitch, 5000);

    // === ТЕКСТОВЫЙ ГЛЮК ===
    const glitchTexts = ["Т1К-Т4К", "Т!К-Т@К", "ТИХ-ТАХ", "*******", "TIK-TAK", "ТИК-Т0К", "ТИК-ТАК?"];
    function textGlitch() {
        let random = glitchTexts[Math.floor(Math.random() * glitchTexts.length)];
        titleDiv.innerText = random;
        setTimeout(() => {
            titleDiv.innerText = originalTitle;
        }, 500);
    }
    setInterval(() => {
        if (Math.random() < 0.6) textGlitch();
    }, 10000);

    // === ПОЛНЫЙ ГЛИТЧ ПО G ИЛИ ТРОЙНОМУ ТАПУ ===
    function fullGlitch() {
        glitch();
        textGlitch();
        if (navigator.vibrate) navigator.vibrate(50);
    }
    document.addEventListener('keydown', (e) => { if (e.key === 'g' || e.key === 'G') fullGlitch(); });
    let taps = 0;
    let tapTimer;
    document.body.addEventListener('touchstart', () => {
        taps++;
        if (taps === 3) { fullGlitch(); taps = 0; clearTimeout(tapTimer); }
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => { taps = 0; }, 800);
    });

    // === ИНВЕРСИЯ ===
    setInterval(() => {
        document.body.style.filter = 'invert(1)';
        setTimeout(() => document.body.style.filter = '', 400);
    }, 10000);

    // === ПРОБЕЛ ЗАМОРАЖИВАЕТ ТАЙМЕР ===
    let frozen = false;
    let frozenT;
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !frozen) {
            e.preventDefault();
            frozen = true;
            clearInterval(timerInterval);
            timerDiv.style.opacity = '0.4';
            frozenT = setTimeout(() => {
                timerInterval = setInterval(updateTimer, 1000);
                timerDiv.style.opacity = '1';
                frozen = false;
            }, 5000);
        }
    });

    // === ПРЕДУПРЕЖДЕНИЕ ПРИ ЗАКРЫТИИ ===
    window.addEventListener('beforeunload', (e) => {
        let msg = "Таймер продолжает тикать. Уверена?";
        e.preventDefault();
        e.returnValue = msg;
        return msg;
    });

    // === ШЁПОТЫ ===
    const words = ["ты не пришла", "я ждал", "я существую?", "тебя нет", "тишина", "пустота", "почему так больно?", "где ты?..",
            "что я сделал не так?", "безразличие", "разочарование", "гордыня", "эгоизм", "равнодушие",
            "почему так..", "за что", "ты обещала", "предательство", "ложь", "страх", "боль", "один", "зачем?", "это конец?.."];
    const whisperBox = document.getElementById('whispers');
    
    function addWhisper() {
        let w = document.createElement('div');
        w.className = 'whisper';
        w.innerText = words[Math.floor(Math.random() * words.length)];
        w.style.left = Math.random() * 80 + '%';
        w.style.top = Math.random() * 80 + '%';
        w.style.fontSize = (3 + Math.random() * 4) + 'vw';
        w.style.animationDuration = (8 + Math.random() * 8) + 's';
        whisperBox.appendChild(w);
        setTimeout(() => w.remove(), 10000);
    }
    
    setInterval(addWhisper, 2000);
    for (let i = 0; i < 10; i++) setTimeout(addWhisper, i * 300);

    // === КЛИК ПО ДАТЕ ===
    document.getElementById('footer').addEventListener('click', () => alert("🔪 Ты здесь. Тик-так."));
</script>
</body>
</html>
