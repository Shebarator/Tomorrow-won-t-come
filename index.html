<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тик-Так</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
            position: relative;
            overflow-x: hidden;
        }

        /* основной контейнер */
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        /* затемнение поверх фона (если нужна полупрозрачная вуаль поверх картинки) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* 0.7 = 70% непрозрачности, регулируй */
            z-index: 1;
            pointer-events: none;
        }

        /* таймер */
        .timer {
            font-size: 6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 40px;
            position: relative;
            z-index: 3;
        }

        /* главная надпись ТИК-ТАК */
        .main-text {
            font-size: 4rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.85);
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 60px;
            position: relative;
            z-index: 3;
        }

        /* контейнер для плавающих фраз */
        .whispers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* стиль каждой фразы */
        .whisper {
            position: absolute;
            font-family: 'Comic Sans MS', 'Segoe Script', 'Pecita', cursive;
            font-size: 1.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.25);  /* полупрозрачность */
            white-space: nowrap;
            opacity: 0;
            animation: floatAndFade 12s infinite ease-in-out;
            transform-origin: center;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 5;
            pointer-events: none;
        }

        /* каждая фраза появляется и медленно уплывает */
        @keyframes floatAndFade {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-5deg);
            }
            10% {
                opacity: 0.7;
            }
            30% {
                opacity: 0.8;
                transform: translate(40px, -20px) rotate(2deg);
            }
            70% {
                opacity: 0.5;
                transform: translate(-20px, -60px) rotate(-3deg);
            }
            100% {
                opacity: 0;
                transform: translate(80px, -120px) rotate(5deg);
            }
        }

        /* дополнительные стили для подписей внизу */
        .footer-note {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: monospace;
            z-index: 5;
            pointer-events: none;
        }

        /* адаптив */
        @media (max-width: 768px) {
            .timer {
                font-size: 2.8rem;
                letter-spacing: 4px;
            }
            .main-text {
                font-size: 2rem;
                letter-spacing: 6px;
            }
            .whisper {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-text">ТИК-ТАК</div>
    <div class="timer" id="countdown">-- : -- : -- : --</div>
</div>

<div class="whispers" id="whispersContainer"></div>
<div class="footer-note">8 МАЯ 23:59</div>

<script>
    // 1. НАСТРОЙКА ТАЙМЕРА
    function getTargetDate() {
        const now = new Date();
        let target = new Date(2026, 4, 8, 23, 59, 0); // 4 = май (месяцы в JS от 0: 0-январь, 4-май), 8 мая 2026, 23:59
        if (target <= now) {
            target.setFullYear(target.getFullYear() + 1);
        }
        return target;
    }

    const targetDate = getTargetDate();

    function updateTimer() {
        const now = Date.now();
        const diff = targetDate.getTime() - now;

        if (diff <= 0) {
            document.getElementById('countdown').innerHTML = "00 : 00 : 00 : 00";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
        const seconds = Math.floor((diff % (60000)) / 1000);

        const formatted = `${days.toString().padStart(2, '0')} : ${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${seconds.toString().padStart(2, '0')}`;
        document.getElementById('countdown').innerHTML = formatted;
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    // 2. ГЕНЕРАЦИЯ ШЕПОТОВ (полупрозрачные фразы)
    const phrases = [
        "шанс был", "я ждал", "я хотел", "опоздала", 
        "30 минут", "3.5 часа", "ты обещала", "тишина", 
        "я помню", "последний шанс", "не пришла", "пустота",
        "я здесь", "а ты где?", "время вышло", "никогда не узнаешь"
    ];

    const container = document.getElementById('whispersContainer');

    function createWhisper(text) {
        const span = document.createElement('div');
        span.className = 'whisper';
        span.textContent = text;

        const randLeft = Math.random() * 90; // % по ширине
        const randTop = Math.random() * 90;   // % по высоте
        const randDuration = 8 + Math.random() * 12; // анимация от 8 до 20 секунд
        const randDelay = Math.random() * 15;

        span.style.left = randLeft + '%';
        span.style.top = randTop + '%';
        span.style.animationDuration = randDuration + 's';
        span.style.animationDelay = randDelay + 's';
        span.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
        span.style.opacity = 0.2 + Math.random() * 0.3;

        container.appendChild(span);

        // удаляем элемент после окончания анимации, чтобы не засорять DOM
        span.addEventListener('animationend', () => {
            span.remove();
        });
    }

    // создаем новые фразы каждые 2.5 секунды
    setInterval(() => {
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        createWhisper(randomPhrase);
    }, 2500);

    // сразу создадим несколько фраз для первой загрузки
    for (let i = 0; i < 8; i++) {
        setTimeout(() => {
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            createWhisper(randomPhrase);
        }, i * 400);
    }
</script>
</body>
</html>
